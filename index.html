<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Drive - Shared Assets</title> <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #050505; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* The Absolute Sovereign UI */
        .top-bar {
            background: #000;
            border-bottom: 2px solid #ff0000;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 15px #00ffff;
            z-index: 100;
        }

        .status-light { width: 10px; height: 10px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 5px #00ff00; }
        .title { color: #ff0000; font-weight: bold; font-size: 14px; text-shadow: 0 0 5px #ff0000; }

        #url-display {
            background: #111;
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            flex-grow: 1;
        }

        .kill-switch {
            background: #ff0000;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 10px;
            border-radius: 3px;
        }

        .viewport { width: 100%; height: calc(100vh - 45px); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="status-light"></div>
        <div class="title">BLACKBIRD OS v1.0</div>
        <div id="url-display">SRC: https://sites.google.com/view/diddy-pro/home</div>
        <button class="kill-switch" onclick="window.location.href='https://google.com'">EMERGENCY EXIT</button>
    </div>

    <div class="viewport">
        <iframe src="https://sites.google.com/view/diddy-pro/home"></iframe>
    </div>

</body>
</html>
