<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal | Blackbird OS</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #050505; /* Blackest Black */
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        /* The UI Border (Absolute Sovereign Aesthetic) */
        .viewport-frame {
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 2px solid #ff0000; /* Red Border */
            box-shadow: 0 0 15px #00ffff; /* Electric Blue Glow */
            border-radius: 8px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Stealth Tab Icon (Favicon) - Change this to "Google Drive" to hide it from teachers */
    </style>
</head>
<body>

    <div class="viewport-frame">
        <iframe src="https://sites.google.com/view/YOUR-SITE-NAME-HERE"></iframe>
    </div>

</body>
</html>
